{% extends "base.html" %}

{% block title %}Users &middot; Flask App{% endblock %}

{% block content %}
  <h1 class="mb-4">Hello, World!</h1>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="h4 mb-0">Users</h2>
    <a href="{{ url_for('create') }}" class="btn btn-primary btn-sm">Add User</a>
  </div>

  <table class="table table-striped table-bordered bg-white align-middle">
    <thead>
      <tr>
        <th scope="col">ID</th>
        <th scope="col">Name</th>
        <th scope="col">Email</th>
        <th scope="col" class="text-end">Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for user in users %}
      <tr>
        <td>{{ user.id }}</td>
        <td>{{ user.name }}</td>
        <td>{{ user.email }}</td>
        <td class="text-end">
          <a href="{{ url_for('edit', user_id=user.id) }}" class="btn btn-outline-secondary btn-sm">Edit</a>
          <form action="{{ url_for('delete', user_id=user.id) }}" method="post" class="d-inline"
                onsubmit="return confirm('Delete this user?');">
            <button type="submit" class="btn btn-outline-danger btn-sm">Delete</button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr>
        <td colspan="4" class="text-center text-muted">No users found.</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
